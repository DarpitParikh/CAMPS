<!DOCTYPE html>
<html>
<head>
  <title>Exam Hall Management</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f5f7fb; }
    .hero { max-width: 900px; margin: 60px auto; background: white; padding: 32px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); }
    h1 { margin-top: 0; color: #1f2937; }
    .actions { display:flex; gap:12px; margin-top: 16px; flex-wrap: wrap; }
    .btn { padding: 10px 16px; background: #667eea; color: white; border: none; border-radius: 6px; text-decoration: none; }
    .btn.secondary { background: #374151; }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Exam Hall Management</h1>
    <p>Welcome. You can view your result without login or sign in as staff.</p>
    <div class="actions">
      <a class="btn" href="{% url 'public_result' %}">View Result</a>
      <a class="btn secondary" href="{% url 'login' %}">Staff Login</a>
    </div>
  </div>
</body>
</html>
