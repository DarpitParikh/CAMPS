<!DOCTYPE html>
<html>
<head>
  <title>Seating</title>
  {% include 'partials/sidebar_styles.html' %}
  <style>
    .content { flex:1; padding: 28px; }
    body { font-family: Arial, sans-serif; background:#f5f7fb; }
    .card { background:white; border:1px solid #e5e7eb; border-radius:10px; padding:20px; max-width:800px; margin: 0 auto; }
    h1 { margin:0 0 12px 0; }
    p { color:#555; }
    .actions { display:flex; gap:12px; flex-wrap:wrap; margin-top:16px; }
    a.btn { padding:12px 16px; background:#667eea; color:white; border-radius:6px; text-decoration:none; }
    a.btn:hover { background:#5568d3; }
    a.btn.secondary { background:#10b981; }
    a.btn.secondary:hover { background:#059669; }
  </style>
</head>
<body>
  <div class="layout">
    {% with active_page='seating' %}
      {% include 'partials/sidebar.html' %}
    {% endwith %}
    <main class="content">
      <div class="card">
    <h1>Seating</h1>
    <p>Select what you want to generate.</p>
    <div class="actions">
      <a class="btn" href="{% url 'allocate' %}">Generate CE Seating Arrangement</a>
      <a class="btn secondary" href="{% url 'attendance_report' %}">Generate Attendance Report</a>
    </div>
      </div>
    </main>
  </div>
</body>
</html>
